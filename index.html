<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photobooth của Jang💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <video id="video" playsinline></video>
  <div id="container">
    <canvas id="mainCanvas"></canvas>
  </div>

  <!-- Instructions Panel -->
  <div id="instructionsPanel" class="glass-panel">
    <h3>✨ Photobooth của Jang💖</h3>
    <div id="tips" class="desktop-tips">
      <p>🖐️ Giơ tay (Hi) → Chụp tự động (3s)</p>
      <p>🙌 Giơ 2 tay "L" → Bật/tắt khung</p>
      <p>👆 Gập ngón trỏ → Chụp thủ công</p>
    </div>
    <div id="tips" class="mobile-tips">
      <p>🖐️ Giơ tay Hi để chụp | 🙌 Giơ 2 tay L để tạo khung | 👆 Gập trỏ để chụp</p>
    </div>
  </div>

  <div id="countdownText">3</div>

  <div id="statusText" class="glass-panel">Đang khởi động Camera...</div>
  <div id="photoCount" class="glass-panel" style="display: none">📸 0/4</div>

  <div id="sidebar"></div>
  
  <!-- Top Controls -->
  <div class="top-controls">
    <button onclick="openGallery()" class="control-btn">
      📸 Thư viện
    </button>
    <button id="countdownBtn" onclick="toggleCountdown()" class="control-btn">
      ⏱️ 3s
    </button>
    <div class="dropdown-container">
      <button class="control-btn">
        ✨ Filter ▾
      </button>
      <div id="filterDropdown" class="dropdown-menu glass-panel">
        <!-- Filters loaded via JS -->
      </div>
    </div>
    <div class="dropdown-container">
      <button class="control-btn">
        🖼️ Khung ▾
      </button>
      <div id="frameDropdown" class="dropdown-menu glass-panel">
        <img src="frame.jpg" class="frame-thumb selected" onclick="selectFrame('frame.jpg', this)">
        <img src="frame2.jpg" class="frame-thumb" onclick="selectFrame('frame2.jpg', this)">
        <img src="frame3.jpg" class="frame-thumb" onclick="selectFrame('frame3.jpg', this)">
        <img src="frame4.png" class="frame-thumb" onclick="selectFrame('frame4.png', this)">
        <img src="frame5.png" class="frame-thumb" onclick="selectFrame('frame5.png', this)">
        <img src="frame6.png" class="frame-thumb" onclick="selectFrame('frame6.png', this)">
      </div>
    </div>
  </div>

  <img id="customFrame" src="frame.jpg" style="display:none;" onload="onFrameLoad()" crossorigin="anonymous" />
  <img id="sunglassesImg" src="sunglasses.png" style="display:none;" crossorigin="anonymous" />
  <img id="sunglasses2Img" src="sunglasses2.png" style="display:none;" crossorigin="anonymous" />

  <div id="photoStripModal">
    <div id="photoStripContainer">
      <canvas id="photoStripCanvas"></canvas>
    </div>
    <div id="stripButtonGroup">
      <button class="strip-btn download" onclick="downloadPhotoStrip()">
        📥 Tải xuống
      </button>
      <button class="strip-btn print" onclick="printPhotoStrip()">
        🖨️ In ảnh
      </button>
      <button class="strip-btn reset" onclick="resetPhotobooth()">
        🔄 Làm lại
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="script.js"></script>

  <!-- Gallery Modal -->
  <div id="galleryModal">
    <div class="gallery-content">
      <div class="gallery-header">
        <h2>📸 Thư viện ảnh của bạn</h2>
        <button onclick="closeGallery()" class="gallery-close">✖</button>
      </div>
      <div id="galleryContainer">
        <!-- Images will be injected here -->
      </div>
    </div>
  </div>
</body>
</html>
