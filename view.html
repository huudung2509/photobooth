<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #888; display: flex; justify-content: center; }
  .container { position: relative; display: inline-block; }
  img { width: 736px; height: 981px; display: block; }
  .grid {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
  }
  .line-x { position: absolute; width: 100%; height: 1px; background: rgba(255,0,0,0.5); }
  .line-y { position: absolute; height: 100%; width: 1px; background: rgba(255,0,0,0.5); }
  .label-x { position: absolute; color: red; font-size: 10px; }
  .label-y { position: absolute; color: red; font-size: 10px; }
</style>
</head>
<body>
<div class="container">
  <img src="frame2.jpg" id="img">
  <div class="grid" id="grid"></div>
</div>
<script>
  const grid = document.getElementById('grid');
  for(let i=0; i<736; i+=50) {
    let line = document.createElement('div');
    line.className = 'line-y';
    line.style.left = i + 'px';
    grid.appendChild(line);
    let label = document.createElement('div');
    label.className = 'label-x';
    label.style.left = (i+2) + 'px';
    label.style.top = '2px';
    label.textContent = i;
    grid.appendChild(label);
  }
  for(let i=0; i<981; i+=50) {
    let line = document.createElement('div');
    line.className = 'line-x';
    line.style.top = i + 'px';
    grid.appendChild(line);
    let label = document.createElement('div');
    label.className = 'label-y';
    label.style.top = (i+2) + 'px';
    label.style.left = '2px';
    label.textContent = i;
    grid.appendChild(label);
  }
</script>
</body>
</html>
